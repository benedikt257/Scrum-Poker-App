<div class="home-container">
  <h1>Scrum Poker</h1>
  <p>Create a new room to begin your estimation session.</p>

  <form (ngSubmit)="onCreate()" #form="ngForm" novalidate>
    <div class="form-group">
      <label for="roomName">Room name</label>
      <input
        id="roomName"
        name="roomName"
        [(ngModel)]="roomName"
        required
        placeholder="e.g. sprint‑planning"
      />
    </div>
    <div class="form-group">
      <label for="playerName">Your name</label>
      <input
        id="playerName"
        name="playerName"
        [(ngModel)]="playerName"
        required
        placeholder="e.g. Alice"
      />
    </div>
    <div class="button-group">
      <button type="button" (click)="onCreate()">Create room</button>
    </div>
    <div class="error" *ngIf="error">{{ error }}</div>
  </form>
</div>
